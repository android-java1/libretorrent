name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]
  schedule:
    - cron: '0 21 * * 5'
  workflow_dispatch:
    inputs:
      languages:
        description: "Languages to analyze"
        required: true
        default: "java-kotlin"

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # 'java-kotlin' is CodeQL's language identifier for the whole JVM/Java
        # family (it replaced the deprecated 'java'). LibreTorrent is 100% Java
        # with no Kotlin sources, but 'java-kotlin' is still the correct value.
        # On manual runs the language comes from the workflow_dispatch input;
        # on push/pull_request/schedule it defaults to 'java-kotlin'.
        # https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning#changing-the-languages-that-are-analyzed
        language: ${{ fromJSON(format('["{0}"]', github.event.inputs.languages || 'java-kotlin')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      # Compile the Java sources of the 'base' debug variant so CodeQL can
      # trace the compilation. The app lives in the ':app' module; the product
      # flavors are 'base' and 'play' (dimension "deploy"), so the debug build
      # of the 'base' flavor is ':app:compileBaseDebugJavaWithJavac'. 'base' is
      # chosen because it needs neither Google Play Services nor Firebase.
      #
      # We run the Java compile task rather than 'assemble' so the build does
      # not package APKs/native ABIs (the libtorrent4j native libraries are
      # prebuilt AAR dependencies, not compiled here, and there is no CMake/NDK
      # build in this project). Compiling still runs the annotation processors
      # (Room), data/view binding and Navigation safe-args code generation, so
      # CodeQL sees all the analyzable Java. The Android SDK is preinstalled on
      # the ubuntu-latest runner and missing platform/build-tools are
      # auto-downloaded.
      - name: Build (Java sources)
        run: ./gradlew :app:compileBaseDebugJavaWithJavac --no-daemon --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
